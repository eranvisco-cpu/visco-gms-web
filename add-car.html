<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Vehicle - Visco GMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-[#0f0f0f] via-[#1a1a1a] to-[#141414] text-white min-h-screen p-6">
    
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-4xl font-bold text-yellow-400 mb-2">New Inspection</h1>
                <p class="text-gray-500 text-sm">Register a new vehicle for inspection</p>
            </div>
            <div class="w-12 h-12 bg-yellow-500 rounded-lg flex items-center justify-center">
                <span class="text-black font-bold text-xl">+</span>
            </div>
        </div>

        <!-- Form Container -->
        <form id="carForm" class="bg-[#1a1a1a] border border-gray-800 rounded-lg shadow-2xl p-8 space-y-6">
            
            <!-- Customer Information -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Customer Name -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Customer Name
                    </label>
                    <input type="text" id="customerName" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" placeholder="e.g., Ahmed Al-Mansouri" required>
                </div>
                <!-- Customer Phone -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Customer Phone
                    </label>
                    <input type="tel" id="customerPhone" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" placeholder="+971-50-123-4567" required>
                </div>
            </div>

            <!-- Plate Number -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    <span class="text-yellow-400">*</span> Plate Number
                </label>
                <input type="text" id="plate" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 uppercase transition" placeholder="DXB B 57611" required>
            </div>

            <!-- Vehicle Information -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Vehicle Brand -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Vehicle Brand
                    </label>
                    <input type="text" id="brand" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" placeholder="e.g., Nissan, Toyota" required>
                </div>
                <!-- Car Model -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Car Model
                    </label>
                    <input type="text" id="model" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" placeholder="e.g., Sunny, Camry" required>
                </div>
                <!-- Mileage -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Mileage (km)
                    </label>
                    <input type="number" id="mileage" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" placeholder="e.g., 50000" min="0" required>
                </div>
            </div>

            <!-- Fuel Type -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    <span class="text-yellow-400">*</span> Fuel Type
                </label>
                <select id="fuelType" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" required>
                    <option value="" disabled selected>Select fuel type...</option>
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Hybrid">Hybrid</option>
                    <option value="Electric">Electric</option>
                </select>
            </div>

            <!-- Image Uploads -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Rear Photo -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Rear Photo
                    </label>
                    <div class="relative h-52 bg-[#252525] border-2 border-dashed border-gray-600 rounded-lg overflow-hidden">
                        <input 
                            type="file" 
                            id="rearImg" 
                            accept="image/*" 
                            capture="environment" 
                            class="hidden" 
                            onchange="previewImage(this, 'rearUploadPrompt', 'rearPreviewContainer')"
                            required
                        >
                        <!-- Upload Prompt -->
                        <label for="rearImg" id="rearUploadPrompt" class="flex items-center justify-center w-full h-full cursor-pointer hover:bg-[#2a2a2a] transition">
                            <div class="text-center">
                                <svg class="w-8 h-8 mx-auto text-gray-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                </svg>
                                <p class="text-xs text-gray-400">Click to upload</p>
                                <p id="rearImgName" class="text-xs text-yellow-400 mt-1 truncate">No file selected</p>
                            </div>
                        </label>
                        <!-- Preview Container -->
                        <div id="rearPreviewContainer" class="hidden absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center">
                            <img id="rearPreviewImg" class="max-h-full max-w-full object-contain" alt="Rear Photo Preview">
                            <button id="rearChangeBtn" type="button" onclick="document.getElementById('rearImg').click()" class="absolute top-3 right-3 bg-yellow-500 hover:bg-yellow-600 text-black p-2 rounded-lg transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- VIN Photo -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> VIN Photo
                    </label>
                    <div class="relative h-52 bg-[#252525] border-2 border-dashed border-gray-600 rounded-lg overflow-hidden">
                        <input 
                            type="file" 
                            id="vinImg" 
                            accept="image/*" 
                            capture="environment" 
                            class="hidden" 
                            onchange="previewImage(this, 'vinUploadPrompt', 'vinPreviewContainer')"
                            required
                        >
                        <!-- Upload Prompt -->
                        <label for="vinImg" id="vinUploadPrompt" class="flex items-center justify-center w-full h-full cursor-pointer hover:bg-[#2a2a2a] transition">
                            <div class="text-center">
                                <svg class="w-8 h-8 mx-auto text-gray-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                </svg>
                                <p class="text-xs text-gray-400">Click to upload</p>
                                <p id="vinImgName" class="text-xs text-yellow-400 mt-1 truncate">No file selected</p>
                            </div>
                        </label>
                        <!-- Preview Container -->
                        <div id="vinPreviewContainer" class="hidden absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center">
                            <img id="vinPreviewImg" class="max-h-full max-w-full object-contain" alt="VIN Photo Preview">
                            <button id="vinChangeBtn" type="button" onclick="document.getElementById('vinImg').click()" class="absolute top-3 right-3 bg-yellow-500 hover:bg-yellow-600 text-black p-2 rounded-lg transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Instrument Cluster Image -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    <span class="text-yellow-400">*</span> Instrument Cluster Photo
                </label>
                <div class="relative h-52 bg-[#252525] border-2 border-dashed border-gray-600 rounded-lg overflow-hidden">
                    <input type="file" id="clusterImg" accept="image/*" capture="environment" class="hidden" onchange="previewImage(this, 'clusterUploadPrompt', 'clusterPreviewContainer')" required>
                    <!-- Upload Prompt -->
                    <label for="clusterImg" id="clusterUploadPrompt" class="flex items-center justify-center w-full h-full cursor-pointer hover:bg-[#2a2a2a] transition">
                        <div class="text-center">
                            <svg class="w-8 h-8 mx-auto text-gray-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                            <p class="text-xs text-gray-400">Click to upload</p>
                            <p id="clusterImgName" class="text-xs text-yellow-400 mt-1 truncate">No file selected</p>
                        </div>
                    </label>
                    <!-- Preview Container -->
                    <div id="clusterPreviewContainer" class="hidden absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center">
                        <img id="clusterPreviewImg" class="max-h-full max-w-full object-contain" alt="Instrument Cluster Preview">
                        <button id="clusterChangeBtn" type="button" onclick="document.getElementById('clusterImg').click()" class="absolute top-3 right-3 bg-yellow-500 hover:bg-yellow-600 text-black p-2 rounded-lg transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Customer Voice -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Customer Voice / Notes</label>
                <textarea 
                    id="voice" 
                    class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" 
                    rows="4" 
                    placeholder="e.g., Customer reported engine noise on startup, minor dent on rear bumper..."
                ></textarea>
            </div>

            <!-- Error Message (hidden by default) -->
            <div id="errorMsg" class="hidden bg-red-900 border border-red-700 p-4 rounded-lg">
                <p class="text-red-200 text-sm" id="errorText"></p>
            </div>

            <!-- Success Message (hidden by default) -->
            <div id="successMsg" class="hidden bg-green-900 border border-green-700 p-4 rounded-lg">
                <p class="text-green-200 text-sm" id="successText"></p>
            </div>

            <!-- Buttons -->
            <div class="flex gap-4 pt-6">
                <button 
                    type="submit" 
                    id="submitBtn"
                    class="flex-1 bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-600 hover:to-yellow-700 text-black font-bold py-4 px-6 rounded-lg transition transform hover:scale-105 duration-200 flex items-center justify-center gap-2"
                >
                    <span id="submitBtnText">SAVE INSPECTION</span>
                    <span id="submitBtnSpinner" class="hidden animate-spin">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                </button>
                <button 
                    type="button" 
                    onclick="window.location.href='index.html'" 
                    class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-semibold py-4 px-6 rounded-lg transition"
                >
                    CANCEL
                </button>
            </div>
        </form>
    </div>

    <script>
        // =====================================================
        // IMAGE PREVIEW FUNCTION
        // =====================================================
        function previewImage(input, uploadPromptId, previewContainerId) {
            const uploadPrompt = document.getElementById(uploadPromptId);
            const previewContainer = document.getElementById(previewContainerId);
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                const fileName = input.files[0].name;
                
                // Derive the file name display ID from the input ID
                const fileNameDisplayId = input.id + 'Name';
                const fileNameDisplay = document.getElementById(fileNameDisplayId);
                if (fileNameDisplay) {
                    fileNameDisplay.textContent = fileName;
                }
                
                reader.onload = function(e) {
                    // Derive the preview image ID from the container ID
                    const previewImgId = previewContainerId.replace('Container', 'Img');
                    const previewImg = document.getElementById(previewImgId);
                    
                    previewImg.src = e.target.result;
                    
                    // Hide upload prompt and show preview
                    uploadPrompt.classList.add('hidden');
                    previewContainer.classList.remove('hidden');
                };
                
                reader.readAsDataURL(input.files[0]);
            } else {
                uploadPrompt.classList.remove('hidden');
                previewContainer.classList.add('hidden');
            }
        }

        // =====================================================
        // SUPABASE CONFIGURATION
        // =====================================================
        // Replace with your actual Supabase credentials
        const SUPABASE_URL = 'https://tqrvcwkulrdqtbkyyvks.supabase.co'; // e.g., https://xyz.supabase.co
        const SUPABASE_ANON_KEY = 'sb_publishable_EKSG2uUBWxrrFTtzKcg0AA_i2IWdaRo'; // Your anon/public key

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // =====================================================
        // FORM SUBMISSION
        // =====================================================
        document.getElementById('carForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset messages
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');

            // Get form values
            const customerName = document.getElementById('customerName').value.trim();
            const customerPhone = document.getElementById('customerPhone').value.trim();
            const plate = document.getElementById('plate').value.trim();
            const brand = document.getElementById('brand').value.trim();
            const model = document.getElementById('model').value.trim();
            const mileage = parseInt(document.getElementById('mileage').value, 10);
            const fuelType = document.getElementById('fuelType').value.trim();
            const voice = document.getElementById('voice').value.trim();
            const rearImgFile = document.getElementById('rearImg').files[0];
            const vinImgFile = document.getElementById('vinImg').files[0];
            const clusterImgFile = document.getElementById('clusterImg').files[0];

            // Capture current date and time
            const now = new Date();
            const inspectionDate = now.toISOString().split('T')[0]; // YYYY-MM-DD
            const inspectionTime = now.toTimeString().split(' ')[0]; // HH:MM:SS

            // Validate form
            if (!customerName || !customerPhone || !plate || !brand || !model || !mileage || !fuelType || !rearImgFile || !vinImgFile || !clusterImgFile) {
                showError('Please fill all required fields and select all three images.');
                return;
            }

            // Validate mileage is a positive number
            if (mileage < 0) {
                showError('Mileage must be a positive number.');
                return;
            }

            // Update button state
            const submitBtn = document.getElementById('submitBtn');
            const submitBtnText = document.getElementById('submitBtnText');
            const submitBtnSpinner = document.getElementById('submitBtnSpinner');
            
            submitBtn.disabled = true;
            submitBtnText.textContent = 'Saving...';
            submitBtnSpinner.classList.remove('hidden');

            try {
                // Generate unique filenames using timestamp and plate number
                const timestamp = Date.now();
                const sanitizedPlate = plate.replace(/\s+/g, '_').toUpperCase();
                
                const rearFileName = `${sanitizedPlate}/${timestamp}_rear.jpg`;
                const vinFileName = `${sanitizedPlate}/${timestamp}_vin.jpg`;
                const clusterFileName = `${sanitizedPlate}/${timestamp}_cluster.jpg`;

                // =====================================================
                // UPLOAD IMAGES TO SUPABASE STORAGE
                // =====================================================
                
                // Upload Rear Photo
                const { error: rearUploadError } = await supabaseClient.storage
                    .from('car-photos')
                    .upload(rearFileName, rearImgFile, {
                        upsert: false,
                    });

                if (rearUploadError) {
                    throw new Error(`Failed to upload rear photo: ${rearUploadError.message}`);
                }

                // Upload VIN Photo
                const { error: vinUploadError } = await supabaseClient.storage
                    .from('car-photos')
                    .upload(vinFileName, vinImgFile, {
                        upsert: false,
                    });

                if (vinUploadError) {
                    throw new Error(`Failed to upload VIN photo: ${vinUploadError.message}`);
                }

                // Upload Instrument Cluster Photo
                const { error: clusterUploadError } = await supabaseClient.storage
                    .from('car-photos')
                    .upload(clusterFileName, clusterImgFile, {
                        upsert: false,
                    });

                if (clusterUploadError) {
                    throw new Error(`Failed to upload cluster photo: ${clusterUploadError.message}`);
                }

                // =====================================================
                // GET PUBLIC URLS
                // =====================================================
                
                const { data: rearUrlData } = supabaseClient.storage
                    .from('car-photos')
                    .getPublicUrl(rearFileName);

                const { data: vinUrlData } = supabaseClient.storage
                    .from('car-photos')
                    .getPublicUrl(vinFileName);

                const { data: clusterUrlData } = supabaseClient.storage
                    .from('car-photos')
                    .getPublicUrl(clusterFileName);

                const rearImageUrl = rearUrlData.publicUrl;
                const vinImageUrl = vinUrlData.publicUrl;
                const clusterImageUrl = clusterUrlData.publicUrl;

                // =====================================================
                // INSERT INTO VEHICLES TABLE
                // =====================================================
                
                const { error: insertError } = await supabaseClient
                    .from('vehicles')
                    .insert([{
                        customer_name: customerName,
                        customer_phone: customerPhone,
                        plate_number: plate,
                        vehicle_brand: brand,
                        car_model: model,
                        mileage: mileage,
                        fuel_type: fuelType,
                        customer_voice: voice || null,
                        status: '01 Inspection',
                        inspection_date: inspectionDate,
                        inspection_time: inspectionTime,
                        image_url: rearImageUrl,
                        vin_image_url: vinImageUrl,
                        cluster_image_url: clusterImageUrl,
                        created_at: new Date().toISOString(),
                    }]);

                if (insertError) {
                    throw new Error(`Failed to save vehicle data: ${insertError.message}`);
                }

                // Success - show message and redirect
                showSuccess('Vehicle inspection saved successfully! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                showError(error.message || 'An unexpected error occurred. Please try again.');
                
                // Reset button
                submitBtn.disabled = false;
                submitBtnText.textContent = 'SAVE INSPECTION';
                submitBtnSpinner.classList.add('hidden');
            }
        });

        // =====================================================
        // HELPER FUNCTIONS
        // =====================================================
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMsg.classList.remove('hidden');
            
            // Scroll to error
            errorMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            const successMsg = document.getElementById('successMsg');
            const successText = document.getElementById('successText');
            successText.textContent = message;
            successMsg.classList.remove('hidden');
            
            // Scroll to success
            successMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
