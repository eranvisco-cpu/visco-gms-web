<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Vehicle - Visco GMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-[#0f0f0f] via-[#1a1a1a] to-[#141414] text-white min-h-screen p-6">
    
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-4xl font-bold text-yellow-400 mb-2">New Inspection</h1>
                <p class="text-gray-500 text-sm">Register a new vehicle for inspection</p>
            </div>
            <div class="w-12 h-12 bg-yellow-500 rounded-lg flex items-center justify-center">
                <span class="text-black font-bold text-xl">+</span>
            </div>
        </div>

        <!-- Form Container -->
        <form id="carForm" class="bg-[#1a1a1a] border border-gray-800 rounded-lg shadow-2xl p-8 space-y-6">
            
            <!-- Plate Number -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    <span class="text-yellow-400">*</span> Plate Number
                </label>
                <input 
                    type="text" 
                    id="plate" 
                    class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 uppercase transition" 
                    placeholder="DXB B 57611" 
                    required
                >
            </div>

            <!-- Car Model -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    <span class="text-yellow-400">*</span> Car Model
                </label>
                <input 
                    type="text" 
                    id="model" 
                    class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" 
                    placeholder="e.g., Nissan Sunny, Toyota Camry" 
                    required
                >
            </div>

            <!-- Image Uploads -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Rear Photo -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Rear Photo
                    </label>
                    <div class="relative">
                        <input 
                            type="file" 
                            id="rearImg" 
                            accept="image/*" 
                            capture="environment" 
                            class="hidden" 
                            required
                        >
                        <label for="rearImg" class="flex items-center justify-center w-full h-32 bg-[#252525] border-2 border-dashed border-gray-600 rounded-lg cursor-pointer hover:border-yellow-400 hover:bg-[#2a2a2a] transition">
                            <div class="text-center">
                                <svg class="w-8 h-8 mx-auto text-gray-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                </svg>
                                <p class="text-xs text-gray-400">Click to upload</p>
                                <p id="rearImgName" class="text-xs text-yellow-400 mt-1 truncate">No file selected</p>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- VIN Photo -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> VIN Photo
                    </label>
                    <div class="relative">
                        <input 
                            type="file" 
                            id="vinImg" 
                            accept="image/*" 
                            capture="environment" 
                            class="hidden" 
                            required
                        >
                        <label for="vinImg" class="flex items-center justify-center w-full h-32 bg-[#252525] border-2 border-dashed border-gray-600 rounded-lg cursor-pointer hover:border-yellow-400 hover:bg-[#2a2a2a] transition">
                            <div class="text-center">
                                <svg class="w-8 h-8 mx-auto text-gray-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                </svg>
                                <p class="text-xs text-gray-400">Click to upload</p>
                                <p id="vinImgName" class="text-xs text-yellow-400 mt-1 truncate">No file selected</p>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Customer Voice -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Customer Voice / Notes</label>
                <textarea 
                    id="voice" 
                    class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" 
                    rows="4" 
                    placeholder="e.g., Customer reported engine noise on startup, minor dent on rear bumper..."
                ></textarea>
            </div>

            <!-- Error Message (hidden by default) -->
            <div id="errorMsg" class="hidden bg-red-900 border border-red-700 p-4 rounded-lg">
                <p class="text-red-200 text-sm" id="errorText"></p>
            </div>

            <!-- Success Message (hidden by default) -->
            <div id="successMsg" class="hidden bg-green-900 border border-green-700 p-4 rounded-lg">
                <p class="text-green-200 text-sm" id="successText"></p>
            </div>

            <!-- Buttons -->
            <div class="flex gap-4 pt-6">
                <button 
                    type="submit" 
                    id="submitBtn"
                    class="flex-1 bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-600 hover:to-yellow-700 text-black font-bold py-4 px-6 rounded-lg transition transform hover:scale-105 duration-200 flex items-center justify-center gap-2"
                >
                    <span id="submitBtnText">SAVE INSPECTION</span>
                    <span id="submitBtnSpinner" class="hidden animate-spin">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                </button>
                <button 
                    type="button" 
                    onclick="window.location.href='index.html'" 
                    class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-semibold py-4 px-6 rounded-lg transition"
                >
                    CANCEL
                </button>
            </div>
        </form>
    </div>

    <script>
        // =====================================================
        // SUPABASE CONFIGURATION
        // =====================================================
        // Replace with your actual Supabase credentials
        const SUPABASE_URL = 'https://tqrvcwkulrdqtbkyyvks.supabase.co'; // e.g., https://xyz.supabase.co
        const SUPABASE_ANON_KEY = 'sb_publishable_EKSG2uUBWxrrFTtzKcg0AA_i2IWdaRo'; // Your anon/public key

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // =====================================================
        // FILE INPUT LISTENERS
        // =====================================================
        document.getElementById('rearImg').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || 'No file selected';
            document.getElementById('rearImgName').textContent = fileName;
        });

        document.getElementById('vinImg').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || 'No file selected';
            document.getElementById('vinImgName').textContent = fileName;
        });

        // =====================================================
        // FORM SUBMISSION
        // =====================================================
        document.getElementById('carForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset messages
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');

            // Get form values
            const plate = document.getElementById('plate').value.trim();
            const model = document.getElementById('model').value.trim();
            const voice = document.getElementById('voice').value.trim();
            const rearImgFile = document.getElementById('rearImg').files[0];
            const vinImgFile = document.getElementById('vinImg').files[0];

            // Validate form
            if (!plate || !model || !rearImgFile || !vinImgFile) {
                showError('Please fill all required fields and select both images.');
                return;
            }

            // Update button state
            const submitBtn = document.getElementById('submitBtn');
            const submitBtnText = document.getElementById('submitBtnText');
            const submitBtnSpinner = document.getElementById('submitBtnSpinner');
            
            submitBtn.disabled = true;
            submitBtnText.textContent = 'Saving...';
            submitBtnSpinner.classList.remove('hidden');

            try {
                // Generate unique filenames using timestamp and plate number
                const timestamp = Date.now();
                const sanitizedPlate = plate.replace(/\s+/g, '_').toUpperCase();
                
                const rearFileName = `${sanitizedPlate}/${timestamp}_rear.jpg`;
                const vinFileName = `${sanitizedPlate}/${timestamp}_vin.jpg`;

                // =====================================================
                // UPLOAD IMAGES TO SUPABASE STORAGE
                // =====================================================
                
                // Upload Rear Photo
                const { error: rearUploadError } = await supabaseClient.storage
                    .from('car-photos')
                    .upload(rearFileName, rearImgFile, {
                        upsert: false,
                    });

                if (rearUploadError) {
                    throw new Error(`Failed to upload rear photo: ${rearUploadError.message}`);
                }

                // Upload VIN Photo
                const { error: vinUploadError } = await supabaseClient.storage
                    .from('car-photos')
                    .upload(vinFileName, vinImgFile, {
                        upsert: false,
                    });

                if (vinUploadError) {
                    throw new Error(`Failed to upload VIN photo: ${vinUploadError.message}`);
                }

                // =====================================================
                // GET PUBLIC URLS
                // =====================================================
                
                const { data: rearUrlData } = supabaseClient.storage
                    .from('car-photos')
                    .getPublicUrl(rearFileName);

                const { data: vinUrlData } = supabaseClient.storage
                    .from('car-photos')
                    .getPublicUrl(vinFileName);

                const rearImageUrl = rearUrlData.publicUrl;
                const vinImageUrl = vinUrlData.publicUrl;

                // =====================================================
                // INSERT INTO VEHICLES TABLE
                // =====================================================
                
                const { error: insertError } = await supabaseClient
                    .from('vehicles')
                    .insert([{
                        plate_number: plate,
                        car_model: model,
                        customer_voice: voice || null,
                        status: '01 Inspection',
                        image_url: rearImageUrl,
                        vin_image_url: vinImageUrl,
                        created_at: new Date().toISOString(),
                    }]);

                if (insertError) {
                    throw new Error(`Failed to save vehicle data: ${insertError.message}`);
                }

                // Success - show message and redirect
                showSuccess('Vehicle inspection saved successfully! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                showError(error.message || 'An unexpected error occurred. Please try again.');
                
                // Reset button
                submitBtn.disabled = false;
                submitBtnText.textContent = 'SAVE INSPECTION';
                submitBtnSpinner.classList.add('hidden');
            }
        });

        // =====================================================
        // HELPER FUNCTIONS
        // =====================================================
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMsg.classList.remove('hidden');
            
            // Scroll to error
            errorMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            const successMsg = document.getElementById('successMsg');
            const successText = document.getElementById('successText');
            successText.textContent = message;
            successMsg.classList.remove('hidden');
            
            // Scroll to success
            successMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
