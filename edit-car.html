<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Vehicle - Visco GMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-[#0f0f0f] via-[#1a1a1a] to-[#141414] text-white min-h-screen p-6">
    
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-4xl font-bold text-yellow-400 mb-2">Edit Inspection</h1>
                <p class="text-gray-500 text-sm">Update vehicle inspection details</p>
            </div>
            <div class="w-12 h-12 bg-yellow-500 rounded-lg flex items-center justify-center">
                <span class="text-black font-bold text-xl">✎</span>
            </div>
        </div>

        <!-- Form Container -->
        <form id="editForm" class="bg-[#1a1a1a] border border-gray-800 rounded-lg shadow-2xl p-8 space-y-6">
            
            <!-- Customer Information -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Customer Name -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Customer Name
                    </label>
                    <input type="text" id="customerName" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" placeholder="e.g., Ahmed Al-Mansouri" required>
                </div>
                <!-- Customer Phone -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Customer Phone
                    </label>
                    <input type="tel" id="customerPhone" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" placeholder="+971-50-123-4567" required>
                </div>
            </div>

            <!-- Plate Number -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    <span class="text-yellow-400">*</span> Plate Number
                </label>
                <input type="text" id="plate" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 uppercase transition" placeholder="DXB B 57611" required>
            </div>

            <!-- Vehicle Information -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Vehicle Brand -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Vehicle Brand
                    </label>
                    <input type="text" id="brand" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" placeholder="e.g., Nissan, Toyota" required>
                </div>
                <!-- Car Model -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Car Model
                    </label>
                    <input type="text" id="model" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" placeholder="e.g., Sunny, Camry" required>
                </div>
                <!-- Mileage -->
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">
                        <span class="text-yellow-400">*</span> Mileage (km)
                    </label>
                    <input type="number" id="mileage" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" placeholder="e.g., 50000" min="0" required>
                </div>
            </div>

            <!-- Fuel Type -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    <span class="text-yellow-400">*</span> Fuel Type
                </label>
                <select id="fuelType" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" required>
                    <option value="" disabled selected>Select fuel type...</option>
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Hybrid">Hybrid</option>
                    <option value="Electric">Electric</option>
                </select>
            </div>

            <!-- Current Images Display -->
            <div class="bg-[#252525] border border-gray-700 rounded-lg p-6">
                <h3 class="text-lg font-semibold text-yellow-400 mb-4">Current Images</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Rear Photo Display -->
                    <div>
                        <p class="text-sm text-gray-400 mb-2">Rear Photo</p>
                        <img id="currentRearImg" src="https://via.placeholder.com/150?text=Rear" alt="Rear Photo" class="w-full h-32 object-cover rounded-lg border border-gray-600">
                    </div>
                    <!-- VIN Photo Display -->
                    <div>
                        <p class="text-sm text-gray-400 mb-2">VIN Photo</p>
                        <img id="currentVinImg" src="https://via.placeholder.com/150?text=VIN" alt="VIN Photo" class="w-full h-32 object-cover rounded-lg border border-gray-600">
                    </div>
                    <!-- Cluster Photo Display -->
                    <div>
                        <p class="text-sm text-gray-400 mb-2">Instrument Cluster</p>
                        <img id="currentClusterImg" src="https://via.placeholder.com/150?text=Cluster" alt="Cluster Photo" class="w-full h-32 object-cover rounded-lg border border-gray-600">
                    </div>
                </div>
            </div>

            <!-- Optional Image Updates -->
            <div class="bg-[#252525] border border-gray-700 rounded-lg p-6">
                <h3 class="text-lg font-semibold text-yellow-400 mb-4">Update Images (Optional)</h3>
                <p class="text-xs text-gray-400 mb-4">Leave empty to keep existing images</p>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Rear Photo -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Rear Photo</label>
                        <div class="relative">
                            <input type="file" id="rearImg" accept="image/*" capture="environment" class="hidden">
                            <label for="rearImg" class="flex items-center justify-center w-full h-32 bg-[#1e1e1e] border-2 border-dashed border-gray-600 rounded-lg cursor-pointer hover:border-yellow-400 hover:bg-[#2a2a2a] transition">
                                <div class="text-center">
                                    <svg class="w-8 h-8 mx-auto text-gray-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                    </svg>
                                    <p class="text-xs text-gray-400">Click to update</p>
                                    <p id="rearImgName" class="text-xs text-yellow-400 mt-1 truncate">No file selected</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- VIN Photo -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">VIN Photo</label>
                        <div class="relative">
                            <input type="file" id="vinImg" accept="image/*" capture="environment" class="hidden">
                            <label for="vinImg" class="flex items-center justify-center w-full h-32 bg-[#1e1e1e] border-2 border-dashed border-gray-600 rounded-lg cursor-pointer hover:border-yellow-400 hover:bg-[#2a2a2a] transition">
                                <div class="text-center">
                                    <svg class="w-8 h-8 mx-auto text-gray-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                    </svg>
                                    <p class="text-xs text-gray-400">Click to update</p>
                                    <p id="vinImgName" class="text-xs text-yellow-400 mt-1 truncate">No file selected</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Cluster Photo -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-300 mb-2">Instrument Cluster</label>
                        <div class="relative">
                            <input type="file" id="clusterImg" accept="image/*" capture="environment" class="hidden">
                            <label for="clusterImg" class="flex items-center justify-center w-full h-32 bg-[#1e1e1e] border-2 border-dashed border-gray-600 rounded-lg cursor-pointer hover:border-yellow-400 hover:bg-[#2a2a2a] transition">
                                <div class="text-center">
                                    <svg class="w-8 h-8 mx-auto text-gray-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                    </svg>
                                    <p class="text-xs text-gray-400">Click to update</p>
                                    <p id="clusterImgName" class="text-xs text-yellow-400 mt-1 truncate">No file selected</p>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Customer Voice -->
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Customer Voice / Notes</label>
                <textarea id="voice" class="w-full bg-[#252525] p-3 rounded-lg border border-gray-700 text-white focus:border-yellow-400 focus:outline-none focus:ring-1 focus:ring-yellow-400/30 transition" rows="4" placeholder="e.g., Customer reported engine noise on startup, minor dent on rear bumper..."></textarea>
            </div>

            <!-- Error Message (hidden by default) -->
            <div id="errorMsg" class="hidden bg-red-900 border border-red-700 p-4 rounded-lg">
                <p class="text-red-200 text-sm" id="errorText"></p>
            </div>

            <!-- Success Message (hidden by default) -->
            <div id="successMsg" class="hidden bg-green-900 border border-green-700 p-4 rounded-lg">
                <p class="text-green-200 text-sm" id="successText"></p>
            </div>

            <!-- Buttons -->
            <div class="flex gap-4 pt-6">
                <button type="submit" id="submitBtn" class="flex-1 bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-600 hover:to-yellow-700 text-black font-bold py-4 px-6 rounded-lg transition transform hover:scale-105 duration-200 flex items-center justify-center gap-2">
                    <span id="submitBtnText">UPDATE INSPECTION</span>
                    <span id="submitBtnSpinner" class="hidden animate-spin">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                </button>
                <button type="button" onclick="window.location.href='index.html'" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-semibold py-4 px-6 rounded-lg transition">CANCEL</button>
            </div>
        </form>
    </div>

    <script>
        // =====================================================
        // SUPABASE CONFIGURATION
        // =====================================================
        const SUPABASE_URL = 'https://tqrvcwkulrdqtbkyyvks.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_EKSG2uUBWxrrFTtzKcg0AA_i2IWdaRo';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Store vehicle data
        let vehicleData = null;

        // =====================================================
        // GET VEHICLE ID FROM URL
        // =====================================================
        function getVehicleIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // =====================================================
        // LOAD VEHICLE DATA
        // =====================================================
        async function loadVehicleData() {
            const vehicleId = getVehicleIdFromUrl();
            
            if (!vehicleId) {
                showError('Vehicle ID not found in URL. Please go back and try again.');
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('vehicles')
                    .select('*')
                    .eq('id', vehicleId)
                    .single();

                if (error) {
                    throw new Error(`Failed to load vehicle: ${error.message}`);
                }

                vehicleData = data;
                populateForm(data);
                displayCurrentImages(data);

            } catch (error) {
                console.error('Error loading vehicle:', error);
                showError(error.message || 'Failed to load vehicle data.');
            }
        }

        // =====================================================
        // POPULATE FORM WITH VEHICLE DATA
        // =====================================================
        function populateForm(data) {
            document.getElementById('customerName').value = data.customer_name || '';
            document.getElementById('customerPhone').value = data.customer_phone || '';
            document.getElementById('plate').value = data.plate_number || '';
            document.getElementById('brand').value = data.vehicle_brand || '';
            document.getElementById('model').value = data.car_model || '';
            document.getElementById('mileage').value = data.mileage || '';
            document.getElementById('fuelType').value = data.fuel_type || '';
            document.getElementById('voice').value = data.customer_voice || '';
        }

        // =====================================================
        // DISPLAY CURRENT IMAGES
        // =====================================================
        function displayCurrentImages(data) {
            if (data.image_url) {
                document.getElementById('currentRearImg').src = data.image_url;
            }
            if (data.vin_image_url) {
                document.getElementById('currentVinImg').src = data.vin_image_url;
            }
            if (data.cluster_image_url) {
                document.getElementById('currentClusterImg').src = data.cluster_image_url;
            }
        }

        // =====================================================
        // FILE INPUT LISTENERS
        // =====================================================
        document.getElementById('rearImg').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || 'No file selected';
            document.getElementById('rearImgName').textContent = fileName;
        });

        document.getElementById('vinImg').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || 'No file selected';
            document.getElementById('vinImgName').textContent = fileName;
        });

        document.getElementById('clusterImg').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || 'No file selected';
            document.getElementById('clusterImgName').textContent = fileName;
        });

        // =====================================================
        // FORM SUBMISSION
        // =====================================================
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');

            // Get form values
            const customerName = document.getElementById('customerName').value.trim();
            const customerPhone = document.getElementById('customerPhone').value.trim();
            const plate = document.getElementById('plate').value.trim();
            const brand = document.getElementById('brand').value.trim();
            const model = document.getElementById('model').value.trim();
            const mileage = parseInt(document.getElementById('mileage').value, 10);
            const fuelType = document.getElementById('fuelType').value.trim();
            const voice = document.getElementById('voice').value.trim();
            const rearImgFile = document.getElementById('rearImg').files[0];
            const vinImgFile = document.getElementById('vinImg').files[0];
            const clusterImgFile = document.getElementById('clusterImg').files[0];

            // Validate form
            if (!customerName || !customerPhone || !plate || !brand || !model || !mileage || !fuelType) {
                showError('Please fill all required fields.');
                return;
            }

            if (mileage < 0) {
                showError('Mileage must be a positive number.');
                return;
            }

            // Update button state
            const submitBtn = document.getElementById('submitBtn');
            const submitBtnText = document.getElementById('submitBtnText');
            const submitBtnSpinner = document.getElementById('submitBtnSpinner');
            
            submitBtn.disabled = true;
            submitBtnText.textContent = 'Updating...';
            submitBtnSpinner.classList.remove('hidden');

            try {
                let rearImageUrl = vehicleData.image_url;
                let vinImageUrl = vehicleData.vin_image_url;
                let clusterImageUrl = vehicleData.cluster_image_url;

                // Upload new images if provided
                if (rearImgFile || vinImgFile || clusterImgFile) {
                    const timestamp = Date.now();
                    const sanitizedPlate = plate.replace(/\s+/g, '_').toUpperCase();

                    if (rearImgFile) {
                        const rearFileName = `${sanitizedPlate}/${timestamp}_rear_updated.jpg`;
                        const { error: rearError } = await supabaseClient.storage
                            .from('car-photos')
                            .upload(rearFileName, rearImgFile, { upsert: false });
                        if (rearError) throw new Error(`Failed to upload rear photo: ${rearError.message}`);
                        const { data: rearData } = supabaseClient.storage
                            .from('car-photos')
                            .getPublicUrl(rearFileName);
                        rearImageUrl = rearData.publicUrl;
                    }

                    if (vinImgFile) {
                        const vinFileName = `${sanitizedPlate}/${timestamp}_vin_updated.jpg`;
                        const { error: vinError } = await supabaseClient.storage
                            .from('car-photos')
                            .upload(vinFileName, vinImgFile, { upsert: false });
                        if (vinError) throw new Error(`Failed to upload VIN photo: ${vinError.message}`);
                        const { data: vinData } = supabaseClient.storage
                            .from('car-photos')
                            .getPublicUrl(vinFileName);
                        vinImageUrl = vinData.publicUrl;
                    }

                    if (clusterImgFile) {
                        const clusterFileName = `${sanitizedPlate}/${timestamp}_cluster_updated.jpg`;
                        const { error: clusterError } = await supabaseClient.storage
                            .from('car-photos')
                            .upload(clusterFileName, clusterImgFile, { upsert: false });
                        if (clusterError) throw new Error(`Failed to upload cluster photo: ${clusterError.message}`);
                        const { data: clusterData } = supabaseClient.storage
                            .from('car-photos')
                            .getPublicUrl(clusterFileName);
                        clusterImageUrl = clusterData.publicUrl;
                    }
                }

                // Update vehicle record
                const { error: updateError } = await supabaseClient
                    .from('vehicles')
                    .update({
                        customer_name: customerName,
                        customer_phone: customerPhone,
                        plate_number: plate,
                        vehicle_brand: brand,
                        car_model: model,
                        mileage: mileage,
                        fuel_type: fuelType,
                        customer_voice: voice || null,
                        image_url: rearImageUrl,
                        vin_image_url: vinImageUrl,
                        cluster_image_url: clusterImageUrl,
                        updated_at: new Date().toISOString(),
                    })
                    .eq('id', vehicleData.id);

                if (updateError) {
                    throw new Error(`Failed to update vehicle: ${updateError.message}`);
                }

                showSuccess('Vehicle inspection updated successfully! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                showError(error.message || 'An unexpected error occurred. Please try again.');
                
                submitBtn.disabled = false;
                submitBtnText.textContent = 'UPDATE INSPECTION';
                submitBtnSpinner.classList.add('hidden');
            }
        });

        // =====================================================
        // HELPER FUNCTIONS
        // =====================================================
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMsg.classList.remove('hidden');
            errorMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            const successMsg = document.getElementById('successMsg');
            const successText = document.getElementById('successText');
            successText.textContent = message;
            successMsg.classList.remove('hidden');
            successMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Load vehicle data on page load
        window.addEventListener('load', loadVehicleData);
    </script>
</body>
</html>
